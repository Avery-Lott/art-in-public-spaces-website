{% extends "base.html" %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
<script>
  // Pass event data from Flask to JS and initialize
  const eventList = {{ events | tojson }};
  initCalendar(eventList);
</script>
{% endblock %}

{% block title %}Calendar — Art in Public Spaces{% endblock %}

{% block content %}
<div class="calendar-header">
  <div>
    <h1>Calendar</h1>
    <p>Upcoming events/meetings</p>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="current-month" id="monthDisplay">April 2026</span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<!-- ─── CALENDAR GRID ─── -->
<div class="calendar-container">
  <div class="calendar-grid-wrapper">
    <div class="calendar-weekdays">
      <div class="weekday">Sun</div>
      <div class="weekday">Mon</div>
      <div class="weekday">Tue</div>
      <div class="weekday">Wed</div>
      <div class="weekday">Thu</div>
      <div class="weekday">Fri</div>
      <div class="weekday">Sat</div>
    </div>
    <div class="calendar-days" id="calendarGrid"></div>
  </div>
</div>

<!-- ─── UPCOMING EVENTS ─── -->
<section class="upcoming-section">
  <h2>Upcoming Events</h2>
  <div class="event-list" id="eventList"></div>
</section>
{% endblock %}
