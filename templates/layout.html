<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Home{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
       <!-- Navbar -->
        <nav class="navbar-nav">
          <div class="nav-logo">
            <div class="cmyk-dots">
              <span class="c"></span><span class="m"></span><span class="y"></span><span class="k"></span>
            </div>
            Art in Public Spaces
          </div>
          <div class="nav-links">
            <button class="active" onclick="showPage('home')">Home</button>
            <button onclick="showPage('gallery')">Gallery</button>
            <button onclick="showPage('about')">About Us</button>
            <button onclick="showPage('calendar')">Calendar</button>
          </div>
        </nav>
      <div class="collapse navbar-collapse" id="navbar">
        <div class="navbar-nav">
          {% if user.is_authenticated %}
          <a class="nav-item nav-link" id="home" href="/">Home</a>
          <a class="nav-item nav-link" id="logout" href="/logout">Logout</a>
          {% else %}
          <a class="nav-item nav-link" id="login" href="/login">Login</a>
          <a class="nav-item nav-link" id="signUp" href="/sign-up">Sign Up</a>
          {% endif %}
        </div>
      </div>
    </nav>
{% block content %}

{% endblock %}

<!-- ─── FOOTER ─── -->
<footer>
  <div class="footer-left">© 2026 Art in Public Spaces</div>
  <div class="cmyk-bar">
    <span class="c"></span><span class="m"></span><span class="y"></span><span class="k"></span>
  </div>
</footer>
</body>
</html>
